<!DOCTYPE html>
<html>

<head>

    <title>Add Donation</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .box{

            width:500px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.2);

        }

        h2{

            text-align:center;
            color:#2E8B57;
            margin-bottom:20px;

        }

        input{

            width:100%;
            padding:12px;
            margin:10px 0;
            font-size:16px;

        }

        button{

            width:100%;
            padding:12px;
            background:#2E8B57;
            color:white;
            border:none;
            cursor:pointer;
            font-size:18px;

        }

        button:hover{

            background:#1E5631;

        }

    </style>

</head>

<body>

<div class="box">

<h2>Add Food Donation</h2>

<form method="POST">

<input
type="text"
name="food_name"
placeholder="Food Name"
required>

<input
type="text"
name="quantity"
placeholder="Quantity"
required>

<input
type="text"
name="address"
placeholder="Pickup Address"
required>

<input
type="text"
name="ready_until"
placeholder="Ready Until (Example: 8:30 PM)"
required>

<input
type="text"
name="phone"
placeholder="Restaurant Phone Number"
required>

<button>

Post Donation

</button>

</form>

</div>

</body>

</html>
