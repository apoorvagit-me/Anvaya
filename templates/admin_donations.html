<!DOCTYPE html>
<html>

<head>

<title>Donations</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:40px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
}

th{
    background:#2E8B57;
    color:white;
}

a{
    text-decoration:none;
    background:#2E8B57;
    color:white;
    padding:10px 18px;
    border-radius:5px;
}

</style>

</head>

<body>

<h1>All Donations</h1>

<table>

<tr>

<th>ID</th>

<th>Restaurant</th>

<th>Food</th>

<th>Quantity</th>

<th>Status</th>

<th>Claimed By</th>

</tr>

{% for donation in donations %}

<tr>

<td>{{ donation.id }}</td>

<td>{{ donation.restaurant }}</td>

<td>{{ donation.food_name }}</td>

<td>{{ donation.quantity }}</td>

<td>{{ donation.status }}</td>

<td>{{ donation.claimed_by }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/admin/dashboard">Back</a>

</body>

</html>
