<!DOCTYPE html>
<html>

<head>

<title>Restaurants</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:40px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:left;
}

th{
    background:#2E8B57;
    color:white;
}

a{
    text-decoration:none;
    background:#2E8B57;
    color:white;
    padding:10px 18px;
    border-radius:5px;
}

</style>

</head>

<body>

<h1>Registered Restaurants</h1>

<table>

<tr>

<th>ID</th>

<th>Restaurant</th>

<th>Email</th>

</tr>

{% for restaurant in restaurants %}

<tr>

<td>{{ restaurant.id }}</td>

<td>{{ restaurant.restaurant_name }}</td>

<td>{{ restaurant.email }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/admin/dashboard">Back</a>

</body>

</html>
