<!DOCTYPE html>
<html>

<head>

    <title>NGO Registration</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:400px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 20px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            color:#1565C0;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#1565C0;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0d47a1;
        }

        p{
            text-align:center;
        }

    </style>

</head>

<body>

<div class="box">

<h2>NGO Registration</h2>

<form method="POST">

<input
type="text"
name="ngo_name"
placeholder="NGO Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Register
</button>

</form>

<br>

<p>
Already have an account?
<a href="/ngo/login">Login</a>
</p>

<p>
<a href="/">🏠 Back to Home</a>
</p>

</div>

</body>

</html>
