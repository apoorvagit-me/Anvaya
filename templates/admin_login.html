<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:400px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            color:#2E8B57;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:12px;
            background:#2E8B57;
            color:white;
            border:none;
            font-size:17px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>Login</button>

</form>

</div>

</body>
</html>
